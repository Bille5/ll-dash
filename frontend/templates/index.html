<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LL Dash"/>
  <title>LL Dash</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body>

<!-- PIN Gate -->
<div id="pin-gate" class="pin-gate hidden">
  <div class="pin-card">
    <div class="pin-logo">LL<span>DASH</span></div>
    <p class="pin-sub">Team 3650 · Limited Liability</p>
    <div class="pin-dots" id="pin-dots">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-keypad">
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key key-clear" data-key="clear">⌫</button>
      <button class="key" data-key="0">0</button>
      <button class="key key-enter" data-key="enter">→</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="app hidden">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">LL<span>DASH</span></span>
      <span class="topbar-event" id="topbar-event">No Event</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="refresh-btn">↻</button>
      <button class="icon-btn" id="settings-btn">⚙</button>
    </div>
  </header>

  <main class="page-container" id="page-container"></main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="dashboard"><span class="nav-icon">◈</span><span class="nav-label">Dash</span></button>
    <button class="nav-btn" data-page="schedule"><span class="nav-icon">◷</span><span class="nav-label">Schedule</span></button>
    <button class="nav-btn" data-page="rankings"><span class="nav-icon">◬</span><span class="nav-label">Rankings</span></button>
    <button class="nav-btn" data-page="scouting"><span class="nav-icon">◉</span><span class="nav-label">Scout</span></button>
    <button class="nav-btn" data-page="alliance"><span class="nav-icon">⬡</span><span class="nav-label">Alliance</span></button>
    <button class="nav-btn" data-page="simulator"><span class="nav-icon">▲</span><span class="nav-label">Sim</span></button>
    <button class="nav-btn" data-page="hub"><span class="nav-icon">⊞</span><span class="nav-label">Hub</span></button>
  </nav>
</div>

<!-- Settings Sheet -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-backdrop" id="settings-backdrop"></div>
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="modal-close" id="settings-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="setting-group">
        <label class="setting-label">Season</label>
        <select class="setting-select" id="setting-season"></select>
      </div>
      <div class="setting-group">
        <label class="setting-label">Search Events</label>
        <input class="setting-input" id="setting-event-search" placeholder="Type city or event name…" autocomplete="off"/>
        <div class="event-search-results" id="event-search-results"></div>
      </div>
      <div class="setting-group">
        <label class="setting-label">Active Event</label>
        <div class="active-event-display" id="active-event-display">None selected</div>
      </div>
      <button class="btn btn-danger" id="logout-btn">🔒 Lock App</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/pages/dashboard.js"></script>
<script src="/static/js/pages/schedule.js"></script>
<script src="/static/js/pages/rankings.js"></script>
<script src="/static/js/pages/scouting.js"></script>
<script src="/static/js/pages/alliance.js"></script>
<script src="/static/js/pages/simulator.js"></script>
<script src="/static/js/pages/hub.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
